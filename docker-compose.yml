services:
  trader:
    build: ./backend
    ports:
      - "9000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - trader-data:/data
      - ./backend/app:/app/app   # hot-reload in dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    image: nginx:alpine
    ports:
      - "9080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - trader
    restart: unless-stopped

volumes:
  trader-data:
